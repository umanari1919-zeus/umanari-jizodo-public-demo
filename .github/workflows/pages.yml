name: Deploy static demo to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - web/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.PAGES_DEPLOYMENT_ENABLED == 'true' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify web artifact boundary
        shell: bash
        run: |
          test -f web/index.html
          test -f web/app.js
          test -f web/styles.css
          test -f web/demo/race_cards.demo.json
          test ! -e web/incoming
          test ! -e web/data
          if find web -type l -print -quit | grep -q .; then
            echo "Symbolic links are not allowed in the Pages artifact."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
